baseURL: https://brettwolfinger.github.io/
languageCode: en-us
title: Brett Wolfinger
theme: ["PaperMod"]
caches:
  images:
    dir: :cacheDir/images
menu:
  main:
    - identifier: projects
      name: "Projects"
      url: "/projects/"
      weight: 1
    - identifier: blog
      name: "Blog"
      url: "/posts/"
      weight: 2
    - identifier: github
      name: "GitHub"
      url: "https://github.com/BrettWolfinger"
      weight: 10
      icon: "logos/github"

params:
  customCSS:
    - css/extended/custom.css
  profile:
    name: "Brett Wolfinger"
    title: "Gameplay Engineer"
    tagline: "I build gameplay systems and tools."
    description: "Focused on robust architecture, AI integration, and player experience."
    image: "/images/profile.jpg"

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 3
