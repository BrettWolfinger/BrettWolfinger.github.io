{{ define "main" }}
<div class="project-page">
  <h1>{{ .Title }}</h1>
  {{ with .Params.heroImage }}
    <img src="{{ . }}" alt="{{ $.Title }}" class="project-banner">
  {{ end }}

  <p>{{ .Params.description }}</p>

  <h2>Systems Built / Highlights</h2>
  <ul>
    {{ range .Params.systems }}
      <li><strong>{{ .name }}</strong> — {{ .description }}</li>
    {{ end }}
  </ul>

  <h2>Tech Used</h2>
  <p>{{ delimit .Params.tech ", " }}</p>
</div>
{{ end }}
